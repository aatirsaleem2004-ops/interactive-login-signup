<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page | Javascript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <body>
    <div class="container">
        <div class="Title">
            <h1>Muhammad Aatir Saleem</h1>
        </div>
        <div class="form_box">
            <header><h1 id="title">Login</h1></header>
            <form action="">
                <input type="text" placeholder="Enter Name" id="Name_field" required>
                <input type="email" placeholder="Enter Email" required>
                <input type="password" placeholder="Enter Password" required>

                <a href="#">Forget Password ?</a>
                <input type="button" value="Login" id="signinBtn">
                
                <div class="Links">
                    <a class="fb" href="https://www.facebook.com" target="_blank">
                        <img src="Images/fff-removebg-preview.png">
                    </a>

                    <a class="x" href="https://www.x.com" target="_blank">
                        <img src="Images/X_logo-removebg-preview.png">
                    </a>

                    <a class="google" href="https://www.google.com" target="_blank">
                        <img src="Images/google-logo-icon-gsuite-hd-701751694791470gzbayltphh-removebg-preview.png">
                    </a>
                </div>
                <p class="signup">Not a member ?<a href="#" id="signupBtn">Sign Up</a></p>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</body>
</html>
